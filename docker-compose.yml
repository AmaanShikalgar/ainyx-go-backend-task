services:
  postgres:
    image: postgres:16-alpine
    container_name: ainyx_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: ainyx_users
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ainyx_app
    ports:
      - "3000:3000"
    environment:
      APP_PORT: 3000
      APP_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_NAME: ainyx_users
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "./server"

volumes:
  postgres_data: